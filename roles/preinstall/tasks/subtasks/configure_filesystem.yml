---
- name: "[preinstall] Ensure {{ data_dir }} exists"
  ansible.builtin.file:
    path: "{{ data_dir }}"
    state: directory

- name: "[preinstall] Gather hardware facts"
  ansible.builtin.setup:
    gather_subset:
      - hardware

- name: "[preinstall] Find non-os empty disk"
  ansible.builtin.set_fact:
    device_name: "{{ item.key }}"
  when: >
    item.value.partitions | length == 0 and
    item.key is match('^sd[a-z]$')
  loop: "{{ ansible_facts.devices | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: "[preinstall] Create the LVM volume group"
  ansible.builtin.lvg:
    vg: lxc
    pvs: "/dev/{{ device_name }}"
    force: true

- name: "[preinstall] Calculate swap size"
  ansible.builtin.shell: >
    SWAP_MAX_SIZE=$(vgdisplay --units M lxc | grep "VG Size" | awk '{ print int(0.07*$3) }');
    grep MemTotal /proc/meminfo | awk -v MAXMEM=${SWAP_MAX_SIZE} '{ mem=int($2/(2*1024)); if(mem>MAXMEM) mem=MAXMEM; print mem; }'
  register: swap_size
  changed_when: false
  failed_when: swap_size.rc != 0

- name: "[preinstall] Create swap logical volume"
  ansible.builtin.lvol:
    vg: lxc
    lv: swap
    size: "{{ swap_size.stdout }}m"
    force: true

- name: "[preinstall] Create data logical volume"
  ansible.builtin.lvol:
    vg: lxc
    lv: data
    size: 100%FREE
    shrink: false
    force: true

- name: "[preinstall] Create swap filesystem on /dev/lxc/swap"
  ansible.builtin.filesystem:
    fstype: swap
    dev: /dev/lxc/swap

- name: "[preinstall] Create XFS filesystem on /dev/lxc/data"
  ansible.builtin.filesystem:
    fstype: xfs
    dev: /dev/lxc/data

- name: "[preinstall] Mount /dev/lxc/data"
  ansible.builtin.mount:
    path: "{{ data_dir }}"
    state: mounted
    src: /dev/lxc/data
    fstype: xfs
    opts: "defaults,nofail,x-systemd.automount,prjquota,pquota"

- name: "[preinstall] Ensure swap is enabled for /dev/lxc/swap"
  ansible.builtin.mount:
    name: swap
    src: "/dev/lxc/swap"
    fstype: swap
    opts: "swap"
    state: present

- name: "[preinstall] Enable all swap devices"
  ansible.builtin.command: swapon -a
  register: swapon_all
  failed_when: swapon_all.rc != 0

- name: "[preinstall] Ensure data directories exist with correct ownership"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: elastic
    group: elastic
    mode: '0700'
  loop:
    - "{{ data_dir }}"
    - "{{ data_dir }}/elastic"
    - "{{ data_dir }}/docker"
