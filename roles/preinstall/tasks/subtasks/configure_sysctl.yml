---
- name: "[preinstall] Apply sysctl parameters (persistent file and live kernel values)"
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: "{{ sysctl_settings_file }}"
    sysctl_set: true
    reload: true
  loop: "{{ ece_sysctl_parameters }}"
  loop_control:
    label: "{{ item.name }}"
