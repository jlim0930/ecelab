---
- name: "[preinstall] Ensure /etc/systemd/system/docker.service.d directory exists"
  ansible.builtin.file:
    path: /etc/systemd/system/docker.service.d
    state: directory

- name: "[preinstall] Ensure Docker service drop-in configuration is present"
  ansible.builtin.template:
    src: docker.conf.j2
    dest: /etc/systemd/system/docker.service.d/docker.conf
    owner: root
    group: root
    mode: '0644'
  register: docker_conf_result

- name: "[preinstall] Reset and restart Docker if configuration changed"
  block:
    - name: "[preinstall] Stop Docker service"
      ansible.builtin.systemd_service:
        name: docker
        state: stopped

    - name: "[preinstall] Remove Docker data directory"
      ansible.builtin.file:
        path: /var/lib/docker
        state: absent

    - name: "[preinstall] Reload systemd daemon and start Docker"
      ansible.builtin.systemd_service:
        name: docker
        state: started
        enabled: true
        daemon_reload: true
  when: docker_conf_result.changed
